<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastify приложение</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }

        .container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #e0e0e0;
            color: #000;
            border: 1px solid #aaa;
            cursor: pointer;
        }

        button:hover {
            background-color: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fastify приложение</h1>
        <button id="apiButton">Сделать запрос на АПИ</button>
    </div>

    <script>
        document.getElementById('apiButton').addEventListener('click', async () => {
            try {
                const response = await fetch('/api');
                const data = await response.json();

                if (data.message === 'Запрос прошел успешно') {
                    console.log('Запрос прошел успешно');
                }
            } catch (error) {
                console.error('Ошибка при запросе:', error);
            }
        });
    </script>
</body>
</html>
